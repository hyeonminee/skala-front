<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 반응형 웹을 위한 viewport 메타 태그 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>나의 여행지</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <h1>🌏 나의 여행 앨범 🎵</h1>
        <audio controls>
            <source src="../media/music.mp3" type="audio/mpeg">
            브라우저가 오디오를 지원하지 않습니다.
        </audio>
        <hr>

        <div class="trip-grid">

            <div class="trip-card">
                <img src="../media/canada.jpeg" width="400" alt="캐나다">
                <p>캐나다 (2025년)</p>
            </div>

            <div class="trip-card">
                <img src="../media/france.jpeg" width="400" alt="프랑스">
                <p>프랑스 (2026년)</p>
            </div>

            <div class="trip-card">
                <img src="../media/barcelona.jpeg" width="400" alt="바르셀로나">
                <p>바르셀로나 (2026년)</p>
            </div>

        </div>

        <hr>
        <h1>📹 나의 여행 영상</h1>
        <video width="400" controls>
            <source src="../media/jeju.mp4" type="video/mp4">
            브라우저가 비디오를 지원하지 않습니다.
        </video>
        <p>제주도 바다의 물고기들 🐟</p>

        <div class="back-home"><a href="index.html" class="home-btn">🏠 메인 페이지로 돌아가기</a></div>
    </div>
</body>
</html>
